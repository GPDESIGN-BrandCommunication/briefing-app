<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Briefing diário para Gonçalo Pina — Surf, IA, Notícias e Condições em Espinho">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Briefing Diário">

    <title>Briefing Diário — Gonçalo Pina</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%234a9eff' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>B</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%231a1a2e' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%234a9eff' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>B</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4a9eff;
            --secondary: #0ea5e9;
            --dark: #1a1a2e;
            --darker: #0f1419;
            --light: #f5f5f5;
            --accent-surf: #ff6b6b;
            --accent-ai: #00d4ff;
            --accent-world: #ffd700;
            --accent-pt: #ff1744;
            --accent-weather: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--light);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0 20px;
        }

        header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header .date {
            color: #999;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.3);
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 158, 255, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-install {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            border: 2px solid var(--primary);
            display: none;
        }

        .btn-install.show {
            display: flex;
        }

        .btn-install:hover {
            background: rgba(74, 158, 255, 0.2);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(74, 158, 255, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #999;
        }

        .briefing {
            display: none;
        }

        .briefing.active {
            display: block;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section.surf h2 { color: var(--accent-surf); }
        .section.ai h2 { color: var(--accent-ai); }
        .section.world h2 { color: var(--accent-world); }
        .section.portugal h2 { color: var(--accent-pt); }
        .section.weather h2 { color: var(--accent-weather); }

        .news-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .news-item strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        .news-item .source {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .weather-card h4 {
            color: var(--accent-weather);
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .weather-card p {
            color: var(--light);
            margin-bottom: 5px;
        }

        .motivation {
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.1), rgba(78, 222, 255, 0.1));
            border-left: 4px solid var(--primary);
            padding: 20px;
            margin-top: 30px;
            border-radius: 8px;
            font-style: italic;
            color: #ddd;
            text-align: center;
        }

        .error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff8787;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85em;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .section {
                padding: 20px;
            }
        }

        .install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.4);
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(120%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .install-prompt.show {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .install-prompt button {
            min-width: auto;
            flex: 0;
            padding: 8px 16px;
            background: white;
            color: var(--dark);
            font-weight: 600;
        }

        .install-prompt button:hover {
            background: var(--light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌅 Briefing Diário</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <div class="button-container">
            <button class="btn-generate" id="generateBtn">
                <span id="btnText">🔄 Gerar Briefing</span>
            </button>
            <button class="btn-install" id="installBtn">
                📱 Instalar App
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Gerando briefing... isto pode levar alguns segundos</p>
        </div>

        <div class="briefing" id="briefing">
            <div id="briefingContent"></div>
        </div>

        <footer>
            Briefing Diário — Gonçalo Pina | Atualizado há alguns momentos
        </footer>
    </div>

    <div class="install-prompt" id="installPrompt">
        <span>Adicionar app à tela inicial?</span>
        <button id="confirmInstall">Instalar</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
